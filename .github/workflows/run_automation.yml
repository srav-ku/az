name: Debug AzNude

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install requests beautifulsoup4

      - run: python debug.py

      - uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_response.html
