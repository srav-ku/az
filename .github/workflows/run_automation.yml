name: Sheets Automation Engine

on:
  workflow_dispatch:   # This enables the manual "Run workflow" button in GitHub

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install App Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 gspread google-auth

    - name: Run Script Processor
      env:
        VIDARA_API_KEY: ${{ secrets.VIDARA_API_KEY }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
      run: python automation.py
