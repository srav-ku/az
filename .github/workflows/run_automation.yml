name: Sheets Automation Engine

on:
  workflow_dispatch:    # Manual Execution Trigger
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Files
        uses: actions/checkout@v4

      # Frees up ~30GB of disk space
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install App Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 gspread google-auth playwright

      - name: Install Playwright Chromium System Binaries
        run: |
          python -m playwright install chromium --with-deps

      - name: Run Script Processor
        env:
          VIDARA_API_KEY: ${{ secrets.VIDARA_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python automation.py
